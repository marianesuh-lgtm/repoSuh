server:
  port: 8080

spring:
  application:
    name: mrsShakes

  datasource:
    url: jdbc:postgresql://localhost:5432/mrs_shakes_db
    username: mrs_shakes_dev
    password: '!qazxsw2'
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "http://myShakes.ddns.net:8080/login/oauth2/code/kakao"
            client-name: Kakao
            provider: kakao
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "http://myShakes.ddns.net:8080/login/oauth2/code/naver"
            client-name: Naver
            provider: naver

        # [수정 포인트] provider는 registration과 같은 깊이(레벨)에 있어야 합니다.
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.mrs.shakes.dto
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: OTHER

ai:
  ollama:
    base-url: http://suhmac.local:11434
    chat:
      options:
        model: gemma2

comfyui:
  base-url: http://suh.local:8188